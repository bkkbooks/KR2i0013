body:
  text: 三楚新録卷一宋周羽翀撰馬氏諱殷上蔡人也自云伏波之後唐末擾亂所在豪俠兢起時殷方處卒伍之列隨渠帥何氏南侵長沙據之殷戰頻有功何乃擢為禆將且命為邵州刺史殷寬厚大度能得士之死力何氏卒諸將在外者皆擁兵歸以爭其佐唯殷領士卒如故且素服為何氏發䘮識者謂之知禮未幾衆軍各殺其帥使人共迎殷為主初衆軍之迎殷也值夜殷甚疑懼欲拒而不行將曉忽覩一人黒色而貎甚雄偉手執大棒躬趨進報曰軍國内外平安俄而不見由是殷以為嘉兆其心始安乃謂所侍曰吾之此行未必不為福及至衆果欣躍而奉之殷立且使人間道上表僖宗在蜀聞之甚悦據其表遣使朱書御札許自開國立臺置卿相分天子之半仗焉楊行宻據有淮南聞其建國且遣舟師數萬伐之比至城下殷登樓指麾一鼓而破其兵伏屍流血湘水為之丹焉自是四方懾伏無敢侵之嶺外廖光圖自招陽叛舉族來奔其部曲隨而至者數千人殷以其豪而衆多將拒而不納或有諫者曰廖者料也馬得料必肥是家國强霸之兆何為而拒之遂待之以禮因命光圖為永州刺史光圖且陳南越可取之宜言甚激切殷亦將開拓疆土聞其所陳甚喜使其部將李勲將數萬衆擊南越未數月㧞桂管十八城劉龔懼而乞盟勲則李老虎也勇壯絶倫每一飡費肉十數斤皆割為大臠而啖之故時人號曰李老虎先是桂管兒童每聚戲呼曰大蟲來號呼而走及勲㧞桂管論者以為應莊宗反正下詔徴諸侯入覲而殷以年老不行命長子希範入朝希範多辯善於應對及至莊宗謂曰朕聞卿部内有洞庭湖其波無際有之乎對曰有之陛下一旦南廵狩則此湖不足以飲馬耳莊宗大恱既而曰比聞馬氏之國必為高郁所圖今有子如此高郁何能可得耶高郁殷之謀臣也莊宗將去其爪牙故以是言離間之而希範不察及歸果使人搆其罪郁竟至棄市自是識者知其不克霸焉初希範之入覲途經淮上時桑維翰旅㳺楚泗間知其來遽謁之且曰僕聞楚之為國挾天子而令諸侯其勢不可謂之卑也加以利盡南海而公室大富足下之來非傾府庫之半則不足以供芻粟之費今僕貧者敢以萬金為請惟足下濟之希範輕薄公子覩維翰形短而腰長語魯而且醜不覺絶倒而笑之既而贈與數百縑維翰大怒拂衣不顧而去及殷薨希範立時維翰已為宰相奏削去半仗止稱天䇿上將軍楚王而已其卿相臺閣皆罷之然希範性剛愎好以誇大為事雖去半仗而軍國制度皆擬乘輿乃大興土功建天䇿府中搆九龍殿仍以沈香為龍其數八各長百尺皆抱柱而相向作趨捧之勢而希範坐於其間自謂一龍也毎凌晨將坐先使人焚香於龍腹中烟氣欝然而出若口吐焉自近古以來諸侯王之奢僭未有如此之盛者也時處士戴偃賢而有才嫉其過度自稱𤣥黄子作漁父詩百篇諷之希範聞而不悦遂禁錮士庻無與之交偃竟至餓死麾下將丁思覲雄傑之士以希範氣度不廣乃上書曰今四海分裂中原之地纔十數州而大王克紹先業為諸侯之長未聞折一馬箠為天下計此愚臣所以為耻也惟大王思之希範覽而怒未幾削思覲官希範媱而無禮至於先王妾媵無不烝通又使尼潛搜士庻家女有容色者皆强取之前後約及數百然猶有不足之色乃曰吾聞軒轅賦五百女以昇天吾其庻幾乎未幾死大為識者所笑先是既殺高郁數覩形影將死郁又畫見時謂之冥報焉時異母弟希萼為永州刺史聞其死自以長而當立具舟楫以歸及至長沙衆且立嫡弟希廣矣遽命希萼為鼎州刺史初牙將張萬敵建議以希萼居長立之則順而記室李皋争之曰吾聞立嗣君必以冢嫡希萼乃婢妾所生安可立之乎萬敵退而嘆曰惜哉李公禍自此始未幾希萼果自鼎州舉兵叛將襲長沙希廣聞之遽命將許可瓊拒之既而可瓊倒戈以降希廣計無所出然素好釋氏乃披緇服召衆僧念佛以為禳厭比及城陷念誦之聲不輟其為墨昧皆此𩔖也尋為希萼縊殺之且命捕李皋有擒而至者希萼責之曰吾雖生於庻孽然托體於先君汝何見毁而不使吾繼立耶皋無以對命壯士臠其肉而殺之先是皋問術士陳承福曰吾夀幾何對曰九十至是議者以為九十乃倉卒而死焉既而希萼媱於酒色多為不道小門使謝延澤有美貎希萼必幸之每引延澤入内閣與妻妾間坐而飲大為衆心所惡其弟希崇乘其釁而作亂擒希萼而囚於衡陽既而悔焉遽命舟檝而追之約於長沙南五十里地號昭澤沈之路經衡山縣豪族廖光國子仁勇聞其來與叔疑議曰希萼長而被廢今又見追此必不免吾属受先王重恩而不能為之除禍亂安社稷豈所謂居水土乎乃率數百人刼而立之號衡山王以衡山縣為府且使人募兵數日之間衆及一萬郡縣多起兵應之希崇使求救於吳時吳命邉鎬將兵來救其實伐也初童謠云鞭打馬馬急走鎬至希崇知其謀又將拒焉或以童謡為言希崇不得已遂降及希萼見鎬且請入吳於是鎬以禮遣希萼及希崇舉族而行先是吳加兵而來以鎬多藝且使詐為僧以㳺長沙既至且弄鉢行乞未幾詐亡去故吳竟以為將而鎬非將才毎出師皆載佛事而行時自祝以請福由是三軍解體及武陵酋豪王逵擁兵至竟宵遁焉先是馬氏之强聞海内諸院公子長㓜各八百餘人皆為侈靡放蕩為務識者多非之公子之徒聞而且恐時有國使張氏紿之曰彼所以見非者恐祚之不永也如君昆弟之衆使更而王亦有八百年之家國何憂何懼乎於是時郊外有鄧翁者聞而歎曰文武之道未嘗介意而更納虗誕之説以自安此輩吾見其死於溝壑有日矣及邉鎬師至果驗然星散寒餒而卒者過半焉三楚新録卷一
