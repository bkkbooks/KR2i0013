body:
  text: 三楚新録載記類提要臣等謹案三楚新録三卷宋周羽翀撰羽翀里貫未詳自署稱儒林郎試祕書省校書郎前桂州修仁令蓋宋初人也其稱三楚者以長沙馬殷武陵周行逢江陵髙季興皆據楚地稱王故論次其興廢本末以一國為一卷其中與史抵牾不合者甚多如馬殷本為武安節度使劉建鋒先鋒指揮使佐之奪湖南及建鋒為陳贍所殺軍中迎殷為留後亦未嘗為邵州刺史今羽翀乃稱殷隨渠帥何氏南稱何命為邵州刺使何氏卒衆軍迎殷為主其説皆鑿空無據又謂馬希範入覲桑維翰旅遊楚泗求貨不得拂衣而去及希範立維翰已為宰相奏削去其半仗云云今考希範嗣立在唐明宗長興三年時晉未立國安得有維翰為宰相之事亦為誣罔又如王繞為潘叔嗣所襲與戰敗沒而羽翀以為敗於南越僅以身免竟死於路與諸書所紀並有異同蓋羽翀未覩國史僅據故老所傳述纂此書作三卷而此本實四卷殆後人所分析歟乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:538fae4c9e508292e8ee04b6a7145c3ffed0abece8a1ecc19354ef8d21bf4a98
