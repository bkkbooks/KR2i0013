body:
  text: 三楚新録卷二宋周羽翀撰周氏諱行逢武陵人也世耕鋤為業嘗犯法顯德中馬氏荒亂吳命邊鎬將兵伐之浹旬盡有湘中之地時鎬雖尅勝然安撫無䇿故民多怨叛武陵酋豪王逵劉咬牙等十數人乘衆心之怨謀舉兵襲之未數日而有八千之衆行逢始預焉倍道兼行遇夜奄至城下於是鼓譟斬門而入時鎬軍驟勝士卒解甲不復防禦又當昏黒之際忽聞兵入倉卒驚駭計無所出皆束手就戮遲明死者十有八九鎬以單騎遁走於是逵據其地上表於朝廷天子嘉之就除湖南節度兼中書令逵素雄豪得志之後不拘小禮其車服制度擬於王者先是吳有術士言南楚之分氣色甚盛以日觀之將有王氏起焉偽主聞而憂之且問曰今之諸將處於南楚者誰為王姓或對曰有永州刺史王温耳偽主疑其當之謀殺温且遣使拜温為征南將軍賜以印綬巾帶仍宻於巾中置毒及使至温拜命著巾俄頃腦裂而死未㡬逵舉兵襲長沙而據之即其應也逵好功名嘗秣馬勵兵以俟征戰時行逢已為麾下將衆頗伏其才畧逵因命為副貳行逢雖受命然終以逵非君長之才自是宻結腹心以圗之未幾逵自領兵侵南越留行逢知留後事而行逢因忽謂所親曰王公逵必不返然以後事付吾者所謂以雲雨資蛟龍也吾何憂乎及逵方至桂陽果為越兵所破逵僅以身免既而死於路行逢竟代其位時軍吏多武陵人咸有戀土之心或説行逢曰夫富貴不還鄉如衣錦夜行公起於徒步自署為列侯可謂富且貴矣然而無西還意使鄉人父老平生親知將何以瞻望風采耶行逢感悟即日命駕歸武陵以武陵為西府且使人迎其妻潘氏潘貌素陋然為性剛烈雖行逢已為侯王而待之蔑如也先是所侍皆勸之使詣行逢笑而對曰夫人為心自非聖賢必多變動以吾既老且醜雖欲往而公豈以曩時之心相向哉惟有死而已時聞者未以為然及使至果不從命唯躬率婢僕以耕織自給至於賦税亦及時輸納未嘗逋欠行逢止之而不從曰賦税者官物也豈以己為主而自免之哉行逢聞而有慚色時兵革之役郡邑官吏以聚歛為務行逢患之乃潛使人察其姓名一旦卒然除去自是管内稍稍清肅至於建官設職亦皆慎其選擇嘗有女壻乞補吏行逢度其非才乃曰吏所以理民也今觀汝不堪其事吾當為汝置鍬犁數具汝能用之鉏種以飬老幼亦是美事何禄之求於是竟不補焉時一方翕然號為英主然多猜忌好𤼵人隂事故麾下將帥恐其不免多有謀叛而行逢亦能預為之備往往事未𤼵而誅於是公府凛然入之者若覆氷雪先是前進士何景山為王逵記室每輕忽行逢行逢得志命景山為益陽令未㡬因事縛景山投之於江謂曰汝嘗佐王逵今王逵已死且為我告龍王其殘忍皆此𩔖也故天䇿學士徐仲雅有清才然其性好以滑稽輕薄為事國破之後傷於凍餒行逢素聞其名且以窮困謂必能改節因使召之命為節度判官初王逵之起兵也知設官有輕重權欲其得衆茍能應募皆置司空太保以誘之自是武陵村落鄽市豪横之輩稱司空太保者無筭及仲雅至行逢問曰自吾遷鎮西土控雄盛之地四境懼之乎仲雅對曰公管内滿天太保滿地司空何不懼之行逢不悦未㡬大宴僚吏而仲雅在座行逢又與之論事然行逢夷音毎呼字音多誤仲雅因戲之曰不於五月五日剪却舌頭使語音乖錯如此行逢大怒然仲雅嘗歴事馬氏諸士民信之乆矣故不敢加誅後仲雅竟以忤㫖去職因退居山寺暇日視羣僧争剥㯶枝乃咏其樹曰葉似新蒲緑身如亂錦纒任君千度剥意氣自衝天蓋怨行逢之斥而謗之也有鄧洵美者連郡人也登進士第將歸連上箋行逢署館驛巡官洵美背傴時謂之鄧䭾為性迂僻皆𩔖其形衆咸不悦之故雖處幕府僚而食貧不暇給同年王溥為相聞洵美不得志乃為詩曰綵衣我已登黄閣白社君猶困故廬自是行逢稍優給之未幾給事中李昉至昉亦洵美同年也相見話舊不覺號慟古人布衣交不及此也乆而忤行逢無鑒乃貶為易俗塲官須臾又使人詐為山賊突入公署殺之聞者無不痛惜後李昉再奉命祠南岳知洵美墳在近乃為詩弔之曰今日向君墳畔過不勝懷抱暗酸辛李觀象為節度副使以行逢嚴酷恐其及禍乃寢紙帳卧紙被行逢信而用之凡軍府事無輕重皆决於觀象而觀象性多嫉忌好蔽人之善零陵儒士蔣宻能吟咏頗得風騷之㫖嘗題桑云綺羅因片葉桃李謾同時大為作者所許觀象聞之佯驚曰此漢詩何蔣宻之能為士林以此鄙之及行逢病又托孤復命子保權師尊之且謂保權曰麾下將校有兇狠難制者除之已盡惟衡州張文表耳吾死之後此人必叛萬一不可敵當舉族北歸無使骨肉落虎狼之口言訖奄然而逝未數月張文表果叛於衡州舉舟師順流而下以襲長沙時行軍司馬廖簡知留後事方與軍吏聚㑹有報文表至簡素輕表殊不介意且謂軍吏曰黄口小兒到而擒之何憂乎乃伐鼓飲酒如初於是至晩文表已入城麾軍直至㑹所時簡已醉不能發弓矢唯按膝作氣而已文表親以戈戮之在坐間遇害者數十人時保權年方十三而英爽有膽氣聞叛歎曰先君可謂知人矣僕雖無能安可使軍國落此賊手乎遽命部將楊師璠與萬餘衆討之及師璠將行又親出餞送仍泣對三軍曰先君薨背墳土未乾而兇賊悖逆實保權不孝所致也安敢勞於諸君諸君以先君之故無㤀戮力茍㓕此賊安先君於地下足矣各希勉之其吐氣發言義形於色三軍無不感激然保權猶慮其敗且馳表而乞師未逾旬而師璠已大破文表於平亭津仍裊文表之首於是餘黨皆戮初文表將叛猶豫未定有從者夜夢文表頷上出一龍及明以告而文表大悦曰此天命我也於是舉兵及敗論者以龍神物也而出於頷是禍將作神出焉保權以文表已㓕且命使止師不意王師已破江陵而逼境矣保權懼召李觀象議之觀象曰夫請王師者以討賊張文表故也今文表已破而王師不還豈非朝廷將有事於南地乎然我國之所恃者江陵之在北境耳今江陵已束手不能自救其所且欲與王師相拒此所謂魚入沸鼎而更鼓腮掉尾其可免乎惟公善自圖之無失子孫萬世之利也保權不得已乃出郊迎王師且請入覲天子聞而悦之命以禮遣既至宗族封拜有差先是行逢頗以滛祀為患管内祠廟自非前代有功及民者皆令毁折之約省祭祀之費三分之一時有識之士忻然以為明斷及末年酷信釋氏每一歲之間設大㑹齋者四季無非破耗國用仍度僧建寺所在不輟因暇復召羣僧於府中講唱而已自執爐焚香以聽至披緇之士雖三尺童子皆搶地伏拜之雖梁武篤好未之加也故君子知其不克永世矣三楚新録卷二
