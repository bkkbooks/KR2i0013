body:
  text: 三楚新録卷三宋周羽翀撰高氏諱季興字貽孫峽州峽石人也東魏司徒昻之後幼好武而有膽氣乾符末所在冦賊競起時梁祖為元帥専征伐潛有飛揚跋扈之志思得義勇者與之同力時季興潛察之乃謁梁祖於郊祖見之悅尋拔為制勝軍使其後纍從征討以功授宋州團練使未幾移授荆南兵馬留後及梁祖禪代正拜江陵尹兼管內節度觀察處置等使季興以江陵古之重地又當天下多事隂有割據之志乃大興力役重築城壘執畚者逮十數萬人皆攀援賔友負土助焉其郭外五十里墳冢皆令發掘取磚以甃之及土功畢隂慘之夜皆聞鬼哭鬼火數起將撲之奄然而滅如此者纍月方定論者以為發掘墳冢使幽魂不安故也時諸侯爭霸急於用人進士梁震登第後薄遊江陵季興請為掌書記震性抗直臨事敢言時莊宗反正下詔徴諸侯王入覲季興欣然奉詔將行震諫曰朝廷自反正後有吞併諸侯之心若我繕甲以自守猶恐不保其地况敢拋棄軍國千里入覲哉且又今之諸侯為梁朝舊人者唯公耳安知朝廷不以讐敵相待耶幸望圖之無使懷王之患復見於今日也季興曰吾計決矣多言奚為及至莊宗果欲留之及歸值夜將吏父老出迎於郊外季興乃握震手曰不聽君言幾葬虎口初季興方對莊宗謂之曰今天下負固不服者惟吳與蜀耳朕今欲先有事於蜀而蜀地險阻尤難之江南才隔荆南一水耳朕欲先往焉卿以為何如季興對曰臣聞蜀國地富民饒獲之可建大利江南國貧地狹民少得之恐無益臣願陛下釋吳先蜀時莊宗意亦欲伐蜀及聞季興之言大悅未踰年莊宗伐蜀季興私自喜曰此吾以計紿之彼乃信而用耳未幾遣使册季興為南平王季興謂震曰此恐吾與蜀連衡故也及蜀破書至季興方食乃落筯而嘆曰此吾之失計也所謂倒持太阿授人以柄梁震曰大王勿憂今蜀雖破未必為福未幾莊宗宴駕果再亂一如梁震之言初季興嘗從梁祖出征引軍旦發至逆旅未曉有一嫗秉燭開門而迎其禮甚謹季興頗疑而問之嫗對曰妾適夢金甲神人推門呼曰宜速起有王者來及起開門果有君子至豈非所謂王者耶所以不敢褻慢耳季興大悅後果然洎季興卒從誨立震獨不悅謂所親曰先王平生與吾相見兄弟之不若也今日之下安能屈節北靣復事其子耶於是求解職退處於郊外灌園鬻蔬為别業稱處士每從誨以事召至府側倒跨黃牛往往直造聽事前呼從誨不以官閥止稱大郎君而已從誨以其先王舊人不忍以過殺之有李載仁者唐室之後也唐末避亂於江陵季興署為觀察推官載仁自負文學常感季興見知每從容接待不為少禮然為性迂緩一日將赴季興召方上馬無何部曲相毆載仁怒且命急於厨中取飰并諸肉令相毆者對餐之仍令軍將戒之曰如敢再犯必當以豬肉中加之以酥聞者無不笑之及從誨嗣立有孫光憲者本成都人也旅遊江陵方圖進取從誨辟之用為掌書記自是凡箋奏書檄皆出其手載仁備位而已由是載仁遂與光憲有隙光憲猶能避之故論者多光憲光憲每患兵戈之際書籍不備遇發使諸道未嘗不厚加金帛購求焉於是三年間致書及數萬卷然自負文學常怏怏如不得志又嘗慕史氏之作自恨諸侯幕府不足展其才力每謂交親曰安知獲麟之筆反為倚馬之用因吟劉禹錫詩曰一生不得文章力百口空為飽暖家有梁延嗣者復州景陵人唐天成中將兵守復州監利季興之入覲也莊宗欲殺之既而逃歸益懷怨憤遂以兵攻取復之監利星沙二縣延嗣兵敗為季興所獲至從誨既立擢為大校遂承制授歸州刺史未幾又遷復州團練使仍掌親軍延嗣雖起非行陳自以纍興戎事才年十九諱健兒士卒之語每聚談或有傷犯之者往往交遊變為仇讐光憲與延嗣年甲相亞居嘗自謂筋力不衰一旦赴毬場上馬左右扶持者甚衆延嗣且在後笑曰孰謂大卿年老而彌壯觀其上馬輕健良由扶持者衆爾光憲乃回顧曰非因衆扶蓋是老健延嗣不勝憤怒論者少之有王惠範者平江軍節度保義之子美風儀好讀書初保義之奔荆南也季興以為行軍司馬未幾生惠範及長以門蔭為文學纍遷觀察推官從誨立以女妻之且以惠範本將家子欲使自幕府事掌內外軍政惠範為人踈散不羈聞之不悅入告從誨且辭之自是復以從誨為不知己至軍國之事皆不參預但以金帛購求古書圖畫日以披玩為志焉建隆三年武安軍節度周行逢薨子保權嗣位衡州刺史張文表不服舉兵及直入長沙殺行軍司馬廖簡保權懼告急朝廷乞王師為援朝廷遣宣徽使李處耘領兵萬餘人救之李以路由江陵慮繼沖不測先遣使諭之曰比者王師救應東道之主誠在足下然利在急速故不淹留但假一鄉道使於城外經過幸矣繼沖將許之猶豫未決有大校李景威者素勇悍越次白繼沖曰兵尚權變城外之説實不可信以臣觀之彼實欲乘釁伐我耳况今精兵數萬自先王已訓練備矣景威雖不才願盡以相付不顧性命為大王拒之繼沖聞之曰事未可知爾勿憂也及王師至果如景威之言繼沖大懼乃不得已出郊迎王師且詣李公乞上表入朝李公飛騎以聞天子大悅遺使就除繼沖徐州節度使便道赴任蓋孫光憲之謀也景威以其不用己謀遂扼喉而死繼沖聞而傷之先是荆南尚使瓷器皆高其足而公私競置用之謂之高足碗至大軍一臨舉族東遷髙足之讖一朝應之蓋由天命信矣哉三楚新録卷三
